<!DOCTYPE html>
<html>
<head>
<title>SAHALAT Fleet Finance</title>
<script>
fetch('https://raw.githubusercontent.com/sahalaat/Finance/main/url.json?_=' + Date.now())
  .then(r => r.json())
  .then(d => { window.location.replace(d.url + '/login.html'); })
  .catch(() => { document.getElementById('msg').textContent = 'Server is offline. Please start the server on the PC.'; });
</script>
</head>
<body style="font-family:Arial;text-align:center;padding:60px;color:#1f4e79;">
<h2>SAHALAT Fleet Finance</h2>
<p id="msg">Connecting to server...</p>
</body>
</html>
